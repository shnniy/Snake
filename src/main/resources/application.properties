# ========================================
# 贪吃蛇游戏 — Spring Boot 配置
# ========================================

server.port=8080

# 游戏默认配置
game.grid.width=20
game.grid.height=15
game.initial-snake-length=3
game.normal-tick-ms=200
game.fast-tick-ms=100
game.food-score-normal=10
game.food-score-bonus=30
game.speed-increase-threshold=5

# ========================================
# H2 数据库配置（文件持久化）
# ========================================
spring.datasource.url=jdbc:h2:file:./data/snake-highscores;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA 配置
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
