# ========================================
# 贪吃蛇游戏 — Spring Boot 配置
# ========================================

server.port=8080

# 游戏默认配置
game.grid.width=20
game.grid.height=15
game.initial-snake-length=3
game.normal-tick-ms=200
game.fast-tick-ms=100
game.food-score-normal=10
game.food-score-bonus=30
game.speed-increase-threshold=5

# ========================================
# MongoDB（内嵌模式，MongoConfig 手动管理连接）
# ========================================
spring.data.mongodb.database=snake_game
spring.data.mongodb.auto-index-creation=true

# MongoDB 数据目录
game.mongodb.data.dir=./data/mongodb

# 排除 JDBC/JPA/MongoDB 自动配置（手动管理 Bean）
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
